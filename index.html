<script>
   function animateSticker(sticker){
    const click= document.getElementById("click");
    click.currentTime= 0;
    click.play();
    sticker.style.transform= "scale(1.2) rotate(30deg)";
    setTimeout(()=> {
        sticker.style.transform= "scale(1) rotate(30deg)";
    }, 200);
}
</script>

<script>
    function playClickSound(){
        const sound = document.getElementById("click").cloneNode(true);
        sound.play();
    }
    function animateDolphin(dolphin){
        playClickSound();
        dolphin.animate([
            {transform: "rotate(0deg)"},
            {transform: "rotate(-10deg)"},
            {transform:"rotate(10deg)"},
            {transform:"rotate(-5deg)"},
            {transform: "rotate(0deg)"},
        ],{
            duration:600
        });
    }
</script>

            const music= document.getElementById("music");

        <script>
           function toggleAudio(){
            const music= document.getElementById("ocean");
